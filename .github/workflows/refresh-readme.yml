name: Refresh README

on:
  schedule:
    # Nightly at 07:17 UTC. Offset from the hour avoids cron clump.
    - cron: "17 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate dynamic blocks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_readme.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- README.md; then
            echo "No changes."
            exit 0
          fi
          git config user.name  "rawcell-agent"
          git config user.email "bot@rawcell.local"
          git add README.md
          git commit -m "chore(readme): nightly refresh of dynamic blocks"
          git push
